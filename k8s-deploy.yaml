apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-secure-app
  labels:
    app: my-secure-app
spec:
  replicas: 2 # รันแอปพลิเคชันพร้อมกัน 2 ตัว (Pod) เพื่อช่วยกันกระจายโหลด
  selector:
    matchLabels:
      app: my-secure-app
  template:
    metadata:
      labels:
        app: my-secure-app
    spec:
      containers:
        - name: web-app
          image: yutthaphum/my-secure-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: my-secure-app-service
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300 # พอร์ตที่คุณจะใช้เปิดเข้าดูหน้าเว็บของแอปพลิเคชันจาก Browser
  selector:
    app: my-secure-app
